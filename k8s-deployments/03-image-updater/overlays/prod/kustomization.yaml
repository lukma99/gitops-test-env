apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod
nameSuffix: -prod

commonLabels:
  app.kubernetes.io/name: image-updater-prod

resources:
  - ../../base

patchesStrategicMerge:
  - replicas.yaml
  - service.yaml

images:
  - name: ghcr.io/lukma99/gitops-test-env
    newTag: 2.0.0