apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 01-manual-prod
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/lukma99/gitops-test-env
    path: k8s-deployments/01-manual/overlays/production
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true